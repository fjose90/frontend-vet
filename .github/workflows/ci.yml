name: CI

# Dispara validações em PRs e pushes na branch principal.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Job de PR: rápido, valida apenas a versão principal (Node 24.x).
jobs:
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]

    steps:
      # Baixa o código do repositório.
      - uses: actions/checkout@v4

      # Configura a versão do Node definida na matriz.
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Instala dependências de forma determinística via package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Garante que o build de produção funciona no PR.
      - name: Build application
        run: npm run build

      # Testes opcionais: roda apenas quando o script existir.
      - name: Run tests (optional)
        run: npm test --if-present

  # Job de main: valida compatibilidade (Node 22.x e 24.x) e Docker.
  build-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
      # Baixa o código do repositório.
      - uses: actions/checkout@v4

      # Configura a versão do Node definida na matriz.
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Instala dependências de forma determinística via package-lock.json.
      - name: Install dependencies
        run: npm ci

      # Garante que o build de produção funciona nas versões suportadas.
      - name: Build application
        run: npm run build

      # Testes opcionais: roda apenas quando o script existir.
      - name: Run tests (optional)
        run: npm test --if-present

      # Valida se a imagem Docker de deploy está buildando corretamente.
      - name: Build Docker image
        run: docker build -t frontend-vet:ci .
