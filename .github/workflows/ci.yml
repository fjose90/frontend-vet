name: CI

# Dispara validações em PRs e pushes na branch principal.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Job de PR: rápido, valida apenas a versão principal (Node 24.x).
jobs:
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]

    steps:
      # Baixa o código do repositório.
      - uses: actions/checkout@v4

      # Configura pnpm na versão definida no projeto.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Configura a versão do Node definida na matriz.
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # Instala dependências de forma determinística via pnpm-lock.yaml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Impede merge com erros de lint.
      - name: Run lint
        run: pnpm run lint

      # Impede merge com arquivos fora do padrão de formatação.
      - name: Check formatting
        run: pnpm run format:check

      # Garante que o build de produção funciona no PR.
      - name: Build application
        run: pnpm run build

      # Testes opcionais: roda apenas quando o script existir.
      - name: Run tests (optional)
        run: pnpm run --if-present test

  # Job de main: valida compatibilidade (Node 22.x e 24.x) e Docker.
  build-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
      # Baixa o código do repositório.
      - uses: actions/checkout@v4

      # Configura pnpm na versão definida no projeto.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Configura a versão do Node definida na matriz.
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      # Instala dependências de forma determinística via pnpm-lock.yaml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Impede deploy com erros de lint.
      - name: Run lint
        run: pnpm run lint

      # Impede deploy com arquivos fora do padrão de formatação.
      - name: Check formatting
        run: pnpm run format:check

      # Garante que o build de produção funciona nas versões suportadas.
      - name: Build application
        run: pnpm run build

      # Testes opcionais: roda apenas quando o script existir.
      - name: Run tests (optional)
        run: pnpm run --if-present test

      # Valida se a imagem Docker de deploy está buildando corretamente.
      - name: Build Docker image
        run: docker build -t frontend-vet:ci .
